<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#0D1117;
  color:#fff;
  font-family:'Instrument Sans','Helvetica Neue',sans-serif;
  font-weight:300;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:40px 24px;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(26,107,94,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(184,148,63,.07) 0%, transparent 55%);
  pointer-events:none;
}

.container{
  position:relative;
  z-index:1;
  text-align:center;
  max-width:520px;
  width:100%;
}

/* LOGO */
.logo{
  display:inline-flex;
  align-items:center;
  gap:14px;
  margin-bottom:64px;
}
.logo-mark{
  width:44px;
  height:44px;
  background:#B8943F;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:20px;
  color:#0D1117;
  flex-shrink:0;
}
.logo-txt{line-height:1.2;text-align:left;}
.logo-top{
  font-size:13px;
  letter-spacing:.18em;
  font-weight:600;
  color:#fff;
  display:block;
}
.logo-sub{
  font-size:9px;
  letter-spacing:.14em;
  color:#B8943F;
  display:block;
  margin-top:2px;
}

/* RULE */
.rule{
  width:40px;
  height:2px;
  background:#B8943F;
  margin:0 auto 40px;
}

/* HEADLINE */
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,42px);
  font-weight:400;
  color:#fff;
  line-height:1.1;
  margin-bottom:24px;
  letter-spacing:-.01em;
}
h1 em{
  font-style:italic;
  color:#B8943F;
}

p{
  font-size:15px;
  color:rgba(255,255,255,.45);
  line-height:1.8;
  margin-bottom:48px;
  font-weight:300;
}

/* CONTACT BLOCK */
.contact-block{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
  margin-bottom:56px;
}
.contact-item{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:13px;
  color:rgba(255,255,255,.5);
  text-decoration:none;
  transition:color .2s;
  letter-spacing:.04em;
}
.contact-item:hover{color:rgba(255,255,255,.85);}
.contact-icon{
  width:32px;
  height:32px;
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.contact-icon svg{
  width:14px;
  height:14px;
  fill:none;
  stroke:rgba(255,255,255,.4);
  stroke-width:1.5;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.contact-item:hover .contact-icon{border-color:rgba(184,148,63,.4);}
.contact-item:hover .contact-icon svg{stroke:rgba(184,148,63,.7);}

/* FOOTER LINE */
.footer-line{
  font-size:10px;
  letter-spacing:.14em;
  color:rgba(255,255,255,.15);
  text-transform:uppercase;
}


</style>
</head>
<body>

<div class="container">

  <div class="logo">
    <div class="logo-mark">P</div>
    <div class="logo-txt">
      <span class="logo-top">MAJESTIC PEPTIDES</span>
      <span class="logo-sub">A MAJESTIC R&D DIVISION</span>
    </div>
  </div>

  <div class="rule"></div>

  <h1>We'll be back<br/><em>shortly.</em></h1>

  <p>Our site is currently undergoing scheduled updates.<br/>If you are a physician or practice looking to connect,<br/>reach out directly — we are available now.</p>

  <div class="contact-block">

    <a href="mailto:majesticrdinfo@gmail.com" class="contact-item">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      </div>
      majesticrdinfo@gmail.com
    </a>

  </div>

  <div class="footer-line">© 2026 Majestic R&D &nbsp;&middot;&nbsp; All rights reserved</div>

</div>



</body>
</html>
